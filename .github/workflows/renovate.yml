name: renovate

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        required: false
  schedule:
    # Daily, offset from the top of the hour to dodge GitHub's cron congestion.
    - cron: "23 4 * * *"

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # Requires a classic PAT (or fine-grained token) with repo + workflow scopes stored as
      # the RENOVATE_TOKEN secret; the default GITHUB_TOKEN cannot open PRs that trigger CI.
      - name: Run Renovate
        uses: renovatebot/github-action@v43.0.5
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # The repo config (renovate.json) drives everything else.
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REQUIRE_CONFIG: required
